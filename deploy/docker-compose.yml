version: "3.8"

services:
  backend:
    image: michael0221/eshop-mern-backend:ec2
    container_name: mern-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      APP_URL: ${APP_URL}
    networks:
      - mern-network

  frontend:
    image: michael0221/eshop-mern-frontend:ec2
    container_name: mern-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge
