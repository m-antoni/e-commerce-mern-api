name: Deploy Backend to EC2

on:
  push:
    branches:
      - deploy/ec2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eshop-backend:ec2

      - name: Create .env and docker-compose.yml on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/deploy

            cat <<EOF > ~/deploy/.env
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
            APP_URL=${{ secrets.APP_URL }}
            EOF

            cat <<'COMPOSE_EOF' > ~/deploy/docker-compose.yml
            services:
              backend:
                image: michael0221/eshop-backend:ec2
                container_name: mern-backend
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  NODE_ENV: production
                  PORT: 5000
                networks:
                  - mern-network

              frontend:
                image: michael0221/eshop-mern-frontend:ec2
                container_name: mern-frontend
                restart: unless-stopped
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                networks:
                  - mern-network

            networks:
              mern-network:
                driver: bridge
            COMPOSE_EOF

      - name: Create deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cat <<'SCRIPT_EOF' > ~/deploy/deploy-backend.sh
            #!/bin/bash
            set -e
            echo "***********************************"
            echo "Deploying BACKEND"
            echo "***********************************"
            cd ~/deploy || exit 1
            echo "Pulling backend image..."
            docker compose pull backend
            echo "Starting backend..."
            docker compose up -d backend
            echo "Pruning unused images..."
            docker image prune -f
            echo "***********************************"
            echo "Backend deployment complete"
            echo "***********************************"
            SCRIPT_EOF
            chmod +x ~/deploy/deploy-backend.sh

      - name: Deploy Backend via Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/deploy
            chmod +x deploy-backend.sh
            ./deploy-backend.sh
